<!DOCTYPE html>
<html lang="en">

<head>
  <title>Asset Allocation</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4YMNTX9S2Q"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-4YMNTX9S2Q');
  </script>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="utf-8" http-equiv="encoding">
  <meta name="robots" content="noindex">
  <meta name="googlebot" content="noindex">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=2">
  <link rel="manifest" href="<%= BASE_URL %>/manifest.json">
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      if (!isIOS) {
        return;
      }
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
      if (isStandalone) {
        return;
      }
      var removeManifestLinks = function () {
        var links = document.querySelectorAll('link[rel="manifest"]');
        for (var i = 0; i < links.length; i += 1) {
          var link = links[i];
          if (link && link.parentNode) {
            link.parentNode.removeChild(link);
          }
        }
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', removeManifestLinks);
      } else {
        removeManifestLinks();
      }
    })();
  </script>
  <link rel="apple-touch-icon" href="<%= BASE_URL %>/icons/apple-touch-icon.png">
  <link rel="icon" href="<%= BASE_URL %>/icons/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" /></head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>
